services:
  bracketfrontend:
    image: bracketfrontend
    build:
      context: bracket-frontend
      dockerfile: ./Dockerfile
    environment:
      NODE_ENV: development
    ports:
      - 4200:4200
    volumes:
      - ./bracket-frontend/src:/app/src
      - ./bracket-frontend/angular.json:/app/angular.json
      - ./bracket-frontend/tsconfig.app.json:/app/tsconfig.app.json
      - ./bracket-frontend/tsconfig.json:/app/tsconfig.json
  bracketbackend:
    image: bracketbackend
    build:
      context: bracket-backend
      dockerfile: ./Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: pass
    ports:
      - 8080:8080
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_DB: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d db" ]
      interval: 1s
      timeout: 5s
      retries: 10
  adminer:
    image: adminer
    restart: always
    ports:
      - 9000:8080
