<div class="login-page">
<form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <span class="pb-4 flex items-center justify-center text-2xl font-medium">Log in</span>

  <mat-form-field appearance="outline">
    <mat-label>Username</mat-label>
    <input matInput id="username" type="text" formControlName="username" autocomplete="username" />
    @if (form.get('username')?.hasError('required')) {
      <mat-error>Username is required.</mat-error>
    }
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Password</mat-label>
    <input matInput id="password" type="password" formControlName="password" autocomplete="current-password" />
    @if (form.get('password')?.hasError('required')) {
      <mat-error>Password is required.</mat-error>
    }
  </mat-form-field>

  @if (authFacade.error(); as err) {
    <p class="error">{{ err }}</p>
  }

  <button matButton="filled" type="submit" [disabled]="form.invalid || authFacade.isLoading()">
    {{ authFacade.isLoading() ? 'Logging in…' : 'Log in' }}
  </button>

  <button matButton type="button" (click)="onCreateAccount()">Create account</button>
</form>
</div>
