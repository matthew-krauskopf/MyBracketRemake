<form class="register-form" [formGroup]="form" (ngSubmit)="onSubmit()">
  <h1>Create account</h1>

  <label for="username">Username</label>
  <input id="username" type="text" formControlName="username" autocomplete="username" />

  <label for="email">Email</label>
  <input id="email" type="email" formControlName="email" autocomplete="email" />

  <label for="password">Password</label>
  <input id="password" type="password" formControlName="password" autocomplete="new-password" />

  <label for="confirmPassword">Confirm password</label>
  <input id="confirmPassword" type="password" formControlName="confirmPassword" autocomplete="new-password" />

  @if (form.get('password')?.value && form.get('password')?.hasError('minlength')) {
    <p class="error">Password must be at least 6 characters.</p>
  }

  @if (form.get('confirmPassword')?.value && form.hasError('passwordMismatch')) {
    <p class="error">Passwords do not match.</p>
  }

  <button type="submit" [disabled]="form.invalid || authFacade.registerLoading()">
    {{ authFacade.registerLoading() ? 'Creating account…' : 'Create account' }}
  </button>
</form>
